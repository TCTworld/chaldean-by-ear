<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quiz Write Mode</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h1>Write Mode</h1>
  <p><a href="/sets.html">📦 Sets Hub</a> | <a href="/record.html">🎙️ Go to Recording Page</a> | <a href="manage.html">📋 Manage Terms</a> | <a href="/add.html">➕ Add Sets/Terms</a></p>
    
  <div id="setup">
    <label>Set of Choice:
      <select id="setId"></select>
    </label>
    <button onclick="loadDue()">Start Session (due only)</button>
    <button onclick="loadAll()">Practice All Cards (unlimited)</button>
  </div>

  <div id="quiz" style="display:none;">
    <button onclick="exitSession()">EXIT Exit Session</button>
    <button onclick="playAudio()">🔊 Play Term</button>
    <button onclick="toggleTermText()">👁️ Show Term</button>
    <p id="termText" style="font-weight:bold; display:none;"></p>
    <p>Type the definition:</p>
    <input type="text" id="answer" autocomplete="off">
    <button onclick="submitAnswer()">Submit</button>
    <div id="feedback"></div>
  </div>

  <script>
    let queue = [];
    let current = null;

    async function loadDue() {
      try {
        const setId = document.getElementById('setId').value;
        if (!setId) {
          alert('Please select a set first');
          return;
        }
        const res = await fetch(`/api/sets/${setId}/due`);
        queue = await res.json();
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        document.getElementById('termText').style.display = 'none';
        nextTerm();
      } catch (e) {
        console.error('Error in loadDue:', e);
        alert('Error loading terms: ' + e.message);
      }
    }

    async function loadAll() {
      try {
        const setId = document.getElementById('setId').value;
        if (!setId) {
          alert('Please select a set first');
          return;
        }
        const res = await fetch(`/api/sets/${setId}/all`);
        queue = await res.json();
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz').style.display = 'block';
        nextTerm();
      } catch (e) {
        console.error('Error in loadAll:', e);
        alert('Error loading terms: ' + e.message);
      }
    }

    function nextTerm() {
      if (queue.length === 0) {
        document.getElementById('quiz').innerHTML = '<h2>Session complete!</h2>';
        return;
      }
      current = queue.shift();
      document.getElementById('termText').style.display = 'none';
      document.getElementById('termText').textContent = '';
      document.getElementById('answer').value = '';
      document.getElementById('feedback').innerHTML = '';
      playAudio();
    }

    function playAudio() {
      if (current && current.audio_path) {
        new Audio(current.audio_path).play();
      } else if (current) {
        const u = new SpeechSynthesisUtterance(current.term);
        u.rate = 0.9;
        speechSynthesis.speak(u);
      }
    }

    function toggleTermText() {
      const el = document.getElementById('termText');
      if (current) {
        el.textContent = `Term: ${current.term}`;
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
      }
    }

    async function loadSetOptions() {
      try {
        console.log('Loading set options...');
        const res = await fetch('/api/sets');
        console.log('Response status:', res.status);
        const sets = await res.json();
        console.log('Sets received:', sets);
        const select = document.getElementById('setId');
        select.innerHTML = '';
        if (!Array.isArray(sets)) {
          console.error('Sets is not an array:', sets);
          return;
        }
        if (sets.length === 0) {
          console.warn('No sets returned from API');
          const opt = document.createElement('option');
          opt.textContent = 'No sets available';
          select.appendChild(opt);
          return;
        }
        sets.forEach(s => {
          console.log('Adding set:', s.id, s.name);
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.name;
          select.appendChild(opt);
        });
        console.log('Set options loaded successfully');
      } catch (e) {
        console.error('Error loading set options:', e);
      }
    }

    function exitSession() {
      document.getElementById('setup').style.display = 'block';
      document.getElementById('quiz').style.display = 'none';
      queue = [];
      current = null;
    }

    // Load sets when page loads
    window.addEventListener('DOMContentLoaded', loadSetOptions);
    loadSetOptions();

    async function submitAnswer() {
      try {
        const typed = document.getElementById('answer').value;
        const res = await fetch(`/api/terms/${current.id}/answer`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ typed, correctDefinition: current.definition })
        });
        const result = await res.json();
        showFeedback(result, typed);
      } catch (e) {
        console.error('Error submitting answer:', e);
        alert('Error submitting answer: ' + e.message);
      }
    }

    function showFeedback(result, typed) {
      const div = document.getElementById('feedback');
      div.className = result.correct ? 'correct' : 'incorrect';
      let html = result.correct
        ? `<strong>Correct!</strong> Next review in ${result.nextInterval} day(s).`
        : `<strong>Incorrect.</strong> Correct answer: ${current.definition}`;
      div.innerHTML = html;
      setTimeout(nextTerm, 2000);
    }

    document.getElementById('answer')?.addEventListener('keypress', e => {
      if (e.key === 'Enter') submitAnswer();
    });
  </script>
</body>
</html>
